<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma do Pirata</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Pirata+One&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container" id="telaInicial">
        <div class="pirate-flag">☠️</div>
        <h1 class="main-title">Enigma do Pirata</h1>
        <h2 class="subtitle">Usando Lógica</h2>
        <p class="description">Busca pelos tesouros nas ilhas</p>
        <div class="divider">
            <div class="divider-dot"></div>
        </div>
        <button class="btn-adventure" onclick="iniciarJogo()">
            <svg viewBox="0 0 24 24">
                <path d="M12 2c.55 0 1 .45 1 1v1.1c1.72.45 3 2 3 3.9 0 2.21-1.79 4-4 4s-4-1.79-4-4c0-1.9 1.28-3.45 3-3.9V3c0-.55.45-1 1-1zm0 4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c4.42 0 8 3.58 8 8 0 .55-.45 1-1 1s-1-.45-1-1c0-3.31-2.69-6-6-6s-6 2.69-6 6c0 .55-.45 1-1 1s-1-.45-1-1c0-4.42 3.58-8 8-8z"/>
            </svg>
            Começar Aventura
        </button>
    </div>

    <div class="container" id="telaJogo" style="display:none;">
        <h1 class="main-title">Enigma do Pirata</h1>
        <h2 class="subtitle" id="fase">Fase 1: Regras de Inferência</h2>
        <div class="divider">
            <div class="divider-dot"></div>
        </div>

        <div class="pirate-status">
            <div class="pirate-avatar">🏴‍☠️</div>
            <div class="health-bar-container">
                <div class="health-bar" id="healthBar"></div>
            </div>
            <p class="health-text" id="healthText">Vida: 3 / 3</p>
        </div>

        <div id="jogoConteudo"></div>

        <div id="telaTimeout" style="display:none;">
            <p class="timeout-msg">⚓ Seu pirata foi nocauteado! Descanse e volte em:</p>
            <div id="contadorTempo">02:00</div>
            <p class="timeout-sub">A aventura recomeça automaticamente.</p>
        </div>
    </div>

    <script src="js/desafios.js"></script>
    <script src="js/jogo.js"></script>
</body>
</html>
